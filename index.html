<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BIP Portalegre — Mapa de Transportes Urbanos</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
          integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
          crossorigin="" />
    <style>
        :root {
            --c13: #e74c3c;
            --c2: #2ecc71;
            --c2a: #f39c12;
            --c4: #9b59b6;
            --c12: #3498db;
            --azul: #1abc9c;
            --sidebar-w: 370px;
            --header-h: 54px;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background:#f0f2f5; color:#222; }

        /* ── Header ── */
        header {
            height: var(--header-h);
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #fff;
            display: flex;
            align-items: center;
            padding: 0 20px;
            font-size: 1.15rem;
            font-weight: 600;
            letter-spacing: .3px;
            z-index: 1100;
            position: relative;
            box-shadow: 0 2px 8px rgba(0,0,0,.25);
        }
        header .logo { margin-right: 12px; font-size: 1.5rem; }
        header .subtitle { font-weight: 400; font-size: .85rem; opacity: .75; margin-left: 10px; }

        /* ── Layout ── */
        #app { display: flex; height: calc(100vh - var(--header-h)); }

        /* ── Sidebar ── */
        #sidebar {
            width: var(--sidebar-w);
            min-width: var(--sidebar-w);
            background: #fff;
            overflow-y: auto;
            border-right: 1px solid #ddd;
            z-index: 1000;
            display: flex;
            flex-direction: column;
        }
        .sidebar-section { padding: 16px 18px; border-bottom: 1px solid #eee; }
        .sidebar-section h3 { font-size: .85rem; text-transform: uppercase; letter-spacing: .8px; color: #888; margin-bottom: 10px; }

        /* Route toggles */
        .route-btn {
            display: flex;
            align-items: center;
            width: 100%;
            padding: 10px 14px;
            margin-bottom: 6px;
            border: 2px solid transparent;
            border-radius: 8px;
            background: #f7f8fa;
            cursor: pointer;
            font-size: .92rem;
            font-weight: 500;
            transition: all .15s;
        }
        .route-btn:hover { background: #eef1f5; }
        .route-btn.active { border-color: currentColor; background: #fff; }
        .route-btn .dot {
            width: 14px; height: 14px;
            border-radius: 50%;
            margin-right: 10px;
            flex-shrink: 0;
        }
        .route-btn .toggle {
            margin-left: auto;
            font-size: .75rem;
            opacity: .5;
        }
        .route-btn.active .toggle { opacity: 1; }

        /* Stop info panel */
        #stop-info { display: none; }
        #stop-info.visible { display: block; }
        #stop-info .stop-name { font-size: 1.1rem; font-weight: 700; margin-bottom: 4px; }
        #stop-info .stop-routes { display: flex; flex-wrap: wrap; gap: 6px; margin: 8px 0; }
        #stop-info .stop-route-tag {
            padding: 3px 10px;
            border-radius: 12px;
            font-size: .78rem;
            font-weight: 600;
            color: #fff;
        }

        /* Photos */
        .photos-area { margin-top: 12px; }
        .photos-area h4 { font-size: .82rem; color: #666; margin-bottom: 8px; }
        .photos-grid { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 8px; }
        .photos-grid img {
            width: 80px; height: 80px;
            object-fit: cover;
            border-radius: 6px;
            cursor: pointer;
            border: 2px solid #eee;
            transition: border-color .15s;
        }
        .photos-grid img:hover { border-color: #3498db; }
        .photo-upload-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 14px;
            background: #3498db;
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: .82rem;
            cursor: pointer;
            transition: background .15s;
        }
        .photo-upload-btn:hover { background: #2980b9; }
        .photo-delete-btn {
            background: #e74c3c;
            color: #fff;
            border: none;
            border-radius: 4px;
            padding: 2px 8px;
            font-size: .72rem;
            cursor: pointer;
            margin-left: 4px;
        }

        /* Timetable */
        #timetable-section { display: none; flex: 1; overflow-y: auto; }
        #timetable-section.visible { display: block; }
        .tt-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 12px;
        }
        .tt-header h3 { margin: 0; font-size: .95rem; color: #333; }
        .tt-tabs { display: flex; gap: 4px; margin-bottom: 12px; }
        .tt-tab {
            padding: 6px 14px;
            border: 1px solid #ddd;
            border-radius: 6px;
            background: #f7f8fa;
            cursor: pointer;
            font-size: .8rem;
            font-weight: 500;
        }
        .tt-tab.active { background: #16213e; color: #fff; border-color: #16213e; }
        .tt-table-wrap { overflow-x: auto; margin-bottom: 12px; }
        .tt-table {
            width: 100%;
            border-collapse: collapse;
            font-size: .78rem;
        }
        .tt-table th {
            background: #f0f2f5;
            padding: 6px 8px;
            text-align: left;
            font-weight: 600;
            white-space: nowrap;
            position: sticky;
            top: 0;
        }
        .tt-table td {
            padding: 5px 8px;
            border-bottom: 1px solid #f0f2f5;
            white-space: nowrap;
        }
        .tt-table tr:hover td { background: #f7f8fa; }
        .tt-note { font-size: .78rem; color: #888; font-style: italic; margin-top: 6px; }

        /* ── Map ── */
        #map { flex: 1; z-index: 1; }

        /* ── Modal ── */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,.6);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }
        .modal-overlay.visible { display: flex; }
        .modal-box {
            background: #fff;
            border-radius: 12px;
            max-width: 90vw;
            max-height: 90vh;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,.3);
        }
        .modal-box img {
            max-width: 90vw;
            max-height: 85vh;
            display: block;
        }
        .modal-close {
            position: absolute;
            top: 15px;
            right: 20px;
            background: rgba(0,0,0,.6);
            color: #fff;
            border: none;
            width: 36px; height: 36px;
            border-radius: 50%;
            font-size: 1.2rem;
            cursor: pointer;
        }

        /* ── Mobile sidebar toggle ── */
        #sidebar-toggle {
            display: none;
            position: fixed;
            bottom: 20px;
            left: 20px;
            z-index: 1200;
            width: 48px; height: 48px;
            border-radius: 50%;
            background: #16213e;
            color: #fff;
            border: none;
            font-size: 1.3rem;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(0,0,0,.3);
        }

        /* ── Leaflet popup ── */
        .leaflet-popup-content-wrapper { border-radius: 10px; }
        .leaflet-popup-content { margin: 12px 16px; font-size: .88rem; }
        .popup-title { font-weight: 700; font-size: 1rem; margin-bottom: 4px; }
        .popup-routes { margin: 6px 0; }
        .popup-route-tag {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: .72rem;
            font-weight: 600;
            color: #fff;
            margin: 2px 2px;
        }
        .popup-btn {
            display: inline-block;
            margin-top: 8px;
            padding: 5px 12px;
            background: #3498db;
            color: #fff;
            border-radius: 5px;
            font-size: .78rem;
            cursor: pointer;
            text-decoration: none;
            border: none;
        }
        .popup-btn:hover { background: #2980b9; }

        /* ── Legend ── */
        .legend {
            background: #fff;
            padding: 10px 14px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,.2);
            font-size: .78rem;
            line-height: 1.7;
        }
        .legend-item { display: flex; align-items: center; gap: 8px; }
        .legend-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }

        /* ── Responsive ── */
        @media (max-width: 768px) {
            #sidebar {
                position: fixed;
                left: -100%;
                top: var(--header-h);
                width: 85vw;
                max-width: 360px;
                height: calc(100vh - var(--header-h));
                transition: left .3s;
                z-index: 1100;
                box-shadow: 4px 0 20px rgba(0,0,0,.2);
            }
            #sidebar.open { left: 0; }
            #sidebar-toggle { display: block; }
            #map { width: 100vw; }
        }
    </style>
</head>
<body>

<header>
    <span class="logo">&#128652;</span>
    BIP Portalegre
    <span class="subtitle">Transportes Urbanos — Mapa Interativo</span>
</header>

<div id="app">
    <aside id="sidebar">
        <!-- Routes -->
        <div class="sidebar-section">
            <h3>Carreiras</h3>
            <button class="route-btn" data-route="C13" style="color:var(--c13)" onclick="toggleRoute('C13')">
                <span class="dot" style="background:var(--c13)"></span> Carreira 13
                <span class="toggle">&#10003;</span>
            </button>
            <button class="route-btn" data-route="C2" style="color:var(--c2)" onclick="toggleRoute('C2')">
                <span class="dot" style="background:var(--c2)"></span> Carreira 2
                <span class="toggle">&#10003;</span>
            </button>
            <button class="route-btn" data-route="C2A" style="color:var(--c2a)" onclick="toggleRoute('C2A')">
                <span class="dot" style="background:var(--c2a)"></span> Carreira 2A
                <span class="toggle">&#10003;</span>
            </button>
            <button class="route-btn" data-route="C4" style="color:var(--c4)" onclick="toggleRoute('C4')">
                <span class="dot" style="background:var(--c4)"></span> Carreira 4
                <span class="toggle">&#10003;</span>
            </button>
            <button class="route-btn" data-route="C12" style="color:var(--c12)" onclick="toggleRoute('C12')">
                <span class="dot" style="background:var(--c12)"></span> Carreira 12
                <span class="toggle">&#10003;</span>
            </button>
            <button class="route-btn" data-route="LA" style="color:var(--azul)" onclick="toggleRoute('LA')">
                <span class="dot" style="background:var(--azul)"></span> Linha Azul
                <span class="toggle">&#10003;</span>
            </button>
        </div>

        <!-- Stop info -->
        <div class="sidebar-section" id="stop-info">
            <h3>Paragem Selecionada</h3>
            <div class="stop-name" id="si-name"></div>
            <div class="stop-routes" id="si-routes"></div>
            <div class="photos-area">
                <h4>Fotografias</h4>
                <div class="photos-grid" id="si-photos"></div>
                <input type="file" id="photo-input" accept="image/*" style="display:none" multiple />
                <button class="photo-upload-btn" onclick="document.getElementById('photo-input').click()">
                    &#128247; Adicionar Foto
                </button>
            </div>
        </div>

        <!-- Timetable -->
        <div class="sidebar-section" id="timetable-section">
            <div class="tt-header">
                <h3 id="tt-title">Horário</h3>
            </div>
            <div class="tt-tabs">
                <button class="tt-tab active" onclick="showSchedule('weekday')">Dias Úteis</button>
                <button class="tt-tab" onclick="showSchedule('weekend')">Fim-de-Semana</button>
            </div>
            <div id="tt-content"></div>
        </div>
    </aside>

    <div id="map"></div>
</div>

<button id="sidebar-toggle" onclick="document.getElementById('sidebar').classList.toggle('open')">&#9776;</button>

<!-- Photo lightbox -->
<div class="modal-overlay" id="lightbox">
    <button class="modal-close" onclick="closeLightbox()">&times;</button>
    <div class="modal-box">
        <img id="lightbox-img" src="" alt="Foto da paragem" />
    </div>
</div>

// ════════════════════════════════════════════════
//  MAP SETUP
// ════════════════════════════════════════════════

const map = L.map('map', { zoomControl: true }).setView([39.2920, -7.4300], 14);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
    maxZoom: 19
}).addTo(map);

// Custom circle marker icon
function createIcon(color, size) {
    return L.divIcon({
        className: 'custom-marker',
        html: `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
            <circle cx="${size/2}" cy="${size/2}" r="${size/2-2}" fill="${color}" stroke="#fff" stroke-width="2.5" opacity="0.9"/>
        </svg>`,
        iconSize: [size, size],
        iconAnchor: [size/2, size/2],
        popupAnchor: [0, -size/2]
    });
}

// ════════════════════════════════════════════════
//  MARKERS & LAYERS
// ════════════════════════════════════════════════

const stopMap = {};
STOPS.forEach(s => stopMap[s.id] = s);

const markers = {};
const routeLayers = {};
const activeRoutes = new Set();
let selectedStop = null;
let currentSchedule = 'weekday';

// Create markers
STOPS.forEach(stop => {
    const primaryRoute = stop.routes[0];
    const color = ROUTE_COLORS[primaryRoute];
    const marker = L.marker([stop.lat, stop.lng], { icon: createIcon(color, 22) });

    const routeTags = stop.routes.map(r =>
        `<span class="popup-route-tag" style="background:${ROUTE_COLORS[r]}">${ROUTE_NAMES[r]}</span>`
    ).join('');

    marker.bindPopup(`
        <div class="popup-title">${stop.name}</div>
        <div class="popup-routes">${routeTags}</div>
        <button class="popup-btn" onclick="selectStop('${stop.id}')">Ver detalhes</button>
    `);

    marker.on('click', () => {
        selectStop(stop.id);
    });

    markers[stop.id] = marker;
    marker.addTo(map);
});

// Create route polylines
Object.keys(ROUTE_PATHS).forEach(routeId => {
    const path = ROUTE_PATHS[routeId];
    const coords = path.map(sid => {
        const s = stopMap[sid];
        return s ? [s.lat, s.lng] : null;
    }).filter(Boolean);

    routeLayers[routeId] = L.polyline(coords, {
        color: ROUTE_COLORS[routeId],
        weight: 4,
        opacity: 0.7,
        dashArray: routeId === 'LA' ? '8, 8' : null
    });
});

// Legend
const legend = L.control({ position: 'bottomright' });
legend.onAdd = function() {
    const div = L.DomUtil.create('div', 'legend');
    div.innerHTML = '<strong style="margin-bottom:4px;display:block">Carreiras</strong>' +
        Object.keys(ROUTE_NAMES).map(r =>
            `<div class="legend-item"><span class="legend-dot" style="background:${ROUTE_COLORS[r]}"></span>${ROUTE_NAMES[r]}</div>`
        ).join('');
    return div;
};
legend.addTo(map);

// ════════════════════════════════════════════════
//  ROUTE TOGGLE
// ════════════════════════════════════════════════

function toggleRoute(routeId) {
    const btn = document.querySelector(`.route-btn[data-route="${routeId}"]`);
    if (activeRoutes.has(routeId)) {
        activeRoutes.delete(routeId);
        btn.classList.remove('active');
        if (routeLayers[routeId]) map.removeLayer(routeLayers[routeId]);
        // Hide timetable if this was selected
        document.getElementById('timetable-section').classList.remove('visible');
    } else {
        activeRoutes.add(routeId);
        btn.classList.add('active');
        if (routeLayers[routeId]) routeLayers[routeId].addTo(map);
        showTimetable(routeId);
    }
    updateMarkerVisibility();
}

function updateMarkerVisibility() {
    STOPS.forEach(stop => {
        const marker = markers[stop.id];
        if (activeRoutes.size === 0) {
            marker.addTo(map);
            marker.setIcon(createIcon(ROUTE_COLORS[stop.routes[0]], 22));
        } else {
            const matchingRoutes = stop.routes.filter(r => activeRoutes.has(r));
            if (matchingRoutes.length > 0) {
                marker.addTo(map);
                marker.setIcon(createIcon(ROUTE_COLORS[matchingRoutes[0]], 26));
            } else {
                marker.setIcon(createIcon('#bbb', 16));
            }
        }
    });
}

// ════════════════════════════════════════════════
//  STOP SELECTION
// ════════════════════════════════════════════════

function selectStop(stopId) {
    selectedStop = stopId;
    const stop = stopMap[stopId];
    if (!stop) return;

    const panel = document.getElementById('stop-info');
    panel.classList.add('visible');
    document.getElementById('si-name').textContent = stop.name;

    const routesHtml = stop.routes.map(r =>
        `<span class="stop-route-tag" style="background:${ROUTE_COLORS[r]}">${ROUTE_NAMES[r]}</span>`
    ).join('');
    document.getElementById('si-routes').innerHTML = routesHtml;

    loadPhotos(stopId);

    // Scroll sidebar to show stop info
    panel.scrollIntoView({ behavior: 'smooth' });

    // Close mobile sidebar on selection
    if (window.innerWidth <= 768) {
        document.getElementById('sidebar').classList.remove('open');
    }
}

// ════════════════════════════════════════════════
//  PHOTO MANAGEMENT (localStorage)
// ════════════════════════════════════════════════

function getPhotos(stopId) {
    try {
        return JSON.parse(localStorage.getItem('bip_photos_' + stopId) || '[]');
    } catch { return []; }
}

function savePhotos(stopId, photos) {
    localStorage.setItem('bip_photos_' + stopId, JSON.stringify(photos));
}

function loadPhotos(stopId) {
    const grid = document.getElementById('si-photos');
    const photos = getPhotos(stopId);
    if (photos.length === 0) {
        grid.innerHTML = '<span style="color:#aaa;font-size:.8rem">Sem fotografias</span>';
        return;
    }
    grid.innerHTML = photos.map((p, i) =>
        `<div style="position:relative;display:inline-block">
            <img src="${p}" onclick="openLightbox('${p.replace(/'/g, "\\'")}')" alt="Foto ${i+1}" />
            <button class="photo-delete-btn" onclick="deletePhoto('${stopId}',${i})" title="Remover">&times;</button>
        </div>`
    ).join('');
}

function deletePhoto(stopId, index) {
    const photos = getPhotos(stopId);
    photos.splice(index, 1);
    savePhotos(stopId, photos);
    loadPhotos(stopId);
}

document.getElementById('photo-input').addEventListener('change', function(e) {
    if (!selectedStop) return;
    const files = Array.from(e.target.files);
    const photos = getPhotos(selectedStop);

    let loaded = 0;
    files.forEach(file => {
        const reader = new FileReader();
        reader.onload = function(ev) {
            // Resize image to save localStorage space
            const img = new Image();
            img.onload = function() {
                const canvas = document.createElement('canvas');
                const MAX = 800;
                let w = img.width, h = img.height;
                if (w > MAX || h > MAX) {
                    if (w > h) { h = h * MAX / w; w = MAX; }
                    else { w = w * MAX / h; h = MAX; }
                }
                canvas.width = w;
                canvas.height = h;
                canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                photos.push(canvas.toDataURL('image/jpeg', 0.7));
                loaded++;
                if (loaded === files.length) {
                    savePhotos(selectedStop, photos);
                    loadPhotos(selectedStop);
                }
            };
            img.src = ev.target.result;
        };
        reader.readAsDataURL(file);
    });
    e.target.value = '';
});

function openLightbox(src) {
    document.getElementById('lightbox-img').src = src;
    document.getElementById('lightbox').classList.add('visible');
}

function closeLightbox() {
    document.getElementById('lightbox').classList.remove('visible');
}

document.getElementById('lightbox').addEventListener('click', function(e) {
    if (e.target === this) closeLightbox();
});

// ════════════════════════════════════════════════
//  TIMETABLE
// ════════════════════════════════════════════════

let currentTimetableRoute = null;

function showTimetable(routeId) {
    currentTimetableRoute = routeId;
    const section = document.getElementById('timetable-section');
    section.classList.add('visible');
    document.getElementById('tt-title').textContent = 'Horário — ' + ROUTE_NAMES[routeId];
    renderTimetable(routeId, currentSchedule);
}

function showSchedule(type) {
    currentSchedule = type;
    document.querySelectorAll('.tt-tab').forEach(t => t.classList.remove('active'));
    document.querySelector(`.tt-tab:${type === 'weekday' ? 'first-child' : 'last-child'}`).classList.add('active');
    if (currentTimetableRoute) renderTimetable(currentTimetableRoute, type);
}

function renderTimetable(routeId, schedule) {
    const data = TIMETABLES[routeId]?.[schedule];
    const container = document.getElementById('tt-content');

    if (!data || data.stops.length === 0) {
        container.innerHTML = `<p class="tt-note">${data?.note || 'Sem informação disponível.'}</p>`;
        return;
    }

    let html = `<p style="font-size:.82rem;color:#555;margin-bottom:8px">${data.direction}</p>`;
    html += '<div class="tt-table-wrap"><table class="tt-table"><thead><tr>';
    data.stops.forEach(s => html += `<th>${s}</th>`);
    html += '</tr></thead><tbody>';
    data.trips.forEach(trip => {
        html += '<tr>';
        trip.forEach(t => html += `<td>${t}</td>`);
        html += '</tr>';
    });
    html += '</tbody></table></div>';

    if (data.note) {
        html += `<p class="tt-note">${data.note}</p>`;
    }

    html += `<p class="tt-note" style="margin-top:10px">Horários válidos a partir de 5 de janeiro de 2026.<br>
    SMAT Portalegre — Tel: 245 307 401</p>`;

    container.innerHTML = html;
}

// ════════════════════════════════════════════════
//  KEYBOARD / GLOBAL
// ════════════════════════════════════════════════

document.addEventListener('keydown', e => {
    if (e.key === 'Escape') {
        closeLightbox();
        if (window.innerWidth <= 768) {
            document.getElementById('sidebar').classList.remove('open');
        }
    }
});

// Fit map to show all stops
const bounds = L.latLngBounds(STOPS.map(s => [s.lat, s.lng]));
map.fitBounds(bounds.pad(0.1));
