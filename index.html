<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BIP Portalegre — Urban Bus Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
          integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
          crossorigin="" />
    <style>
        :root {
            --c13:#e74c3c; --c2:#2ecc71; --c2a:#f39c12;
            --c4:#9b59b6; --c12:#3498db; --azul:#1abc9c;
            --sidebar-w:380px; --header-h:54px;
        }
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:#f0f2f5;color:#222}

        header{height:var(--header-h);background:linear-gradient(135deg,#1a1a2e,#16213e);color:#fff;display:flex;align-items:center;padding:0 20px;font-size:1.15rem;font-weight:600;letter-spacing:.3px;z-index:1100;position:relative;box-shadow:0 2px 8px rgba(0,0,0,.25)}
        header .subtitle{font-weight:400;font-size:.85rem;opacity:.75;margin-left:10px}

        #app{display:flex;height:calc(100vh - var(--header-h))}

        #sidebar{width:var(--sidebar-w);min-width:var(--sidebar-w);background:#fff;overflow-y:auto;border-right:1px solid #ddd;z-index:1000;display:flex;flex-direction:column}
        .sb-sec{padding:16px 18px;border-bottom:1px solid #eee}
        .sb-sec h3{font-size:.82rem;text-transform:uppercase;letter-spacing:.8px;color:#888;margin-bottom:10px}

        .route-btn{display:flex;align-items:center;width:100%;padding:10px 14px;margin-bottom:6px;border:2px solid transparent;border-radius:8px;background:#f7f8fa;cursor:pointer;font-size:.92rem;font-weight:500;transition:all .15s}
        .route-btn:hover{background:#eef1f5}
        .route-btn.active{border-color:currentColor;background:#fff}
        .route-btn .dot{width:14px;height:14px;border-radius:50%;margin-right:10px;flex-shrink:0}
        .route-btn .chk{margin-left:auto;font-size:.75rem;opacity:.4}
        .route-btn.active .chk{opacity:1}

        #stop-info{display:none}
        #stop-info.visible{display:block}
        #stop-info .sn{font-size:1.1rem;font-weight:700;margin-bottom:4px}
        .route-tags{display:flex;flex-wrap:wrap;gap:6px;margin:8px 0}
        .rtag{padding:3px 10px;border-radius:12px;font-size:.78rem;font-weight:600;color:#fff}

        .photos-area{margin-top:12px}
        .photos-area h4{font-size:.82rem;color:#666;margin-bottom:8px}
        .pgrid{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px}
        .pgrid img{width:80px;height:80px;object-fit:cover;border-radius:6px;cursor:pointer;border:2px solid #eee;transition:border-color .15s}
        .pgrid img:hover{border-color:#3498db}
        .ubtn{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;background:#3498db;color:#fff;border:none;border-radius:6px;font-size:.82rem;cursor:pointer;transition:background .15s}
        .ubtn:hover{background:#2980b9}
        .dbtn{background:#e74c3c;color:#fff;border:none;border-radius:4px;padding:2px 8px;font-size:.72rem;cursor:pointer;margin-left:4px}

        #tt-sec{display:none;flex:1;overflow-y:auto}
        #tt-sec.visible{display:block}
        .tt-tabs{display:flex;gap:4px;margin-bottom:12px}
        .tt-tab{padding:6px 14px;border:1px solid #ddd;border-radius:6px;background:#f7f8fa;cursor:pointer;font-size:.8rem;font-weight:500}
        .tt-tab.active{background:#16213e;color:#fff;border-color:#16213e}
        .tt-wrap{overflow-x:auto;margin-bottom:12px}
        .tt-table{width:100%;border-collapse:collapse;font-size:.78rem}
        .tt-table th{background:#f0f2f5;padding:6px 8px;text-align:left;font-weight:600;white-space:nowrap;position:sticky;top:0}
        .tt-table td{padding:5px 8px;border-bottom:1px solid #f0f2f5;white-space:nowrap}
        .tt-table tr:hover td{background:#f7f8fa}
        .tt-note{font-size:.78rem;color:#888;font-style:italic;margin-top:6px}

        #map{flex:1;z-index:1}

        .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:2000;justify-content:center;align-items:center}
        .modal-overlay.visible{display:flex}
        .modal-box{background:#fff;border-radius:12px;max-width:90vw;max-height:90vh;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.3)}
        .modal-box img{max-width:90vw;max-height:85vh;display:block}
        .modal-close{position:absolute;top:15px;right:20px;background:rgba(0,0,0,.6);color:#fff;border:none;width:36px;height:36px;border-radius:50%;font-size:1.2rem;cursor:pointer}

        #sidebar-toggle{display:none;position:fixed;bottom:20px;left:20px;z-index:1200;width:48px;height:48px;border-radius:50%;background:#16213e;color:#fff;border:none;font-size:1.3rem;cursor:pointer;box-shadow:0 4px 12px rgba(0,0,0,.3)}

        .leaflet-popup-content-wrapper{border-radius:10px}
        .leaflet-popup-content{margin:12px 16px;font-size:.88rem}
        .popup-title{font-weight:700;font-size:1rem;margin-bottom:4px}
        .popup-routes{margin:6px 0}
        .popup-rtag{display:inline-block;padding:2px 8px;border-radius:10px;font-size:.72rem;font-weight:600;color:#fff;margin:2px}
        .popup-btn{display:inline-block;margin-top:8px;padding:5px 12px;background:#3498db;color:#fff;border-radius:5px;font-size:.78rem;cursor:pointer;border:none}
        .popup-btn:hover{background:#2980b9}

        .legend{background:#fff;padding:10px 14px;border-radius:8px;box-shadow:0 2px 8px rgba(0,0,0,.2);font-size:.78rem;line-height:1.7}
        .legend-item{display:flex;align-items:center;gap:8px}
        .legend-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0}

        @media(max-width:768px){
            #sidebar{position:fixed;left:-100%;top:var(--header-h);width:85vw;max-width:360px;height:calc(100vh - var(--header-h));transition:left .3s;z-index:1100;box-shadow:4px 0 20px rgba(0,0,0,.2)}
            #sidebar.open{left:0}
            #sidebar-toggle{display:block}
            #map{width:100vw}
        }
    </style>
</head>
<body>

<header>
    <span style="margin-right:12px;font-size:1.5rem">&#128652;</span>
    BIP Portalegre
    <span class="subtitle">Urban Bus Map &mdash; Interactive</span>
</header>

<div id="app">
    <aside id="sidebar">
        <div class="sb-sec">
            <h3>Bus Routes</h3>
            <button class="route-btn" data-route="C13" style="color:var(--c13)" onclick="toggleRoute('C13')">
                <span class="dot" style="background:var(--c13)"></span>Route 13<span class="chk">&#10003;</span>
            </button>
            <button class="route-btn" data-route="C2" style="color:var(--c2)" onclick="toggleRoute('C2')">
                <span class="dot" style="background:var(--c2)"></span>Route 2<span class="chk">&#10003;</span>
            </button>
            <button class="route-btn" data-route="C2A" style="color:var(--c2a)" onclick="toggleRoute('C2A')">
                <span class="dot" style="background:var(--c2a)"></span>Route 2A<span class="chk">&#10003;</span>
            </button>
            <button class="route-btn" data-route="C4" style="color:var(--c4)" onclick="toggleRoute('C4')">
                <span class="dot" style="background:var(--c4)"></span>Route 4<span class="chk">&#10003;</span>
            </button>
            <button class="route-btn" data-route="C12" style="color:var(--c12)" onclick="toggleRoute('C12')">
                <span class="dot" style="background:var(--c12)"></span>Route 12<span class="chk">&#10003;</span>
            </button>
            <button class="route-btn" data-route="LA" style="color:var(--azul)" onclick="toggleRoute('LA')">
                <span class="dot" style="background:var(--azul)"></span>Blue Line<span class="chk">&#10003;</span>
            </button>
        </div>

        <div class="sb-sec" id="stop-info">
            <h3>Selected Stop</h3>
            <div class="sn" id="si-name"></div>
            <div class="route-tags" id="si-routes"></div>
            <div class="photos-area">
                <h4>Photos</h4>
                <div class="pgrid" id="si-photos"></div>
                <input type="file" id="photo-input" accept="image/*" style="display:none" multiple />
                <button class="ubtn" onclick="document.getElementById('photo-input').click()">&#128247; Add Photo</button>
            </div>
        </div>

        <div class="sb-sec" id="tt-sec">
            <h3 id="tt-title">Timetable</h3>
            <div class="tt-tabs">
                <button class="tt-tab active" onclick="showSchedule('weekday')">Weekdays</button>
                <button class="tt-tab" onclick="showSchedule('weekend')">Weekends &amp; Holidays</button>
            </div>
            <div id="tt-content"></div>
        </div>
    </aside>
    <div id="map"></div>
</div>

<button id="sidebar-toggle" onclick="document.getElementById('sidebar').classList.toggle('open')">&#9776;</button>

<div class="modal-overlay" id="lightbox">
    <button class="modal-close" onclick="closeLightbox()">&times;</button>
    <div class="modal-box"><img id="lightbox-img" src="" alt="Bus stop photo" /></div>
</div>

// ═══════════════════════════════════════
//  MAP SETUP
// ═══════════════════════════════════════

const map = L.map('map',{zoomControl:true}).setView([39.290,-7.430],14);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
    attribution:'&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
    maxZoom:19
}).addTo(map);

function mkIcon(color,size){
    return L.divIcon({
        className:'',
        html:`<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
            <circle cx="${size/2}" cy="${size/2}" r="${size/2-2}" fill="${color}" stroke="#fff" stroke-width="2.5" opacity="0.9"/>
        </svg>`,
        iconSize:[size,size],iconAnchor:[size/2,size/2],popupAnchor:[0,-size/2]
    });
}

// ═══════════════════════════════════════
//  MARKERS & LAYERS
// ═══════════════════════════════════════

const stopMap={};
STOPS.forEach(s=>stopMap[s.id]=s);

const markers={}, routeLayers={}, activeRoutes=new Set();
let selectedStop=null, curSched='weekday', curTTRoute=null;

STOPS.forEach(stop=>{
    const c=COLORS[stop.routes[0]];
    const m=L.marker([stop.lat,stop.lng],{icon:mkIcon(c,22)});
    const tags=stop.routes.map(r=>`<span class="popup-rtag" style="background:${COLORS[r]}">${NAMES[r]}</span>`).join('');
    m.bindPopup(`<div class="popup-title">${stop.name}</div><div class="popup-routes">${tags}</div>
        <div style="font-size:.72rem;color:#999;margin:4px 0">Source: ${stop.src}</div>
        <button class="popup-btn" onclick="selectStop('${stop.id}')">View details</button>`);
    m.on('click',()=>selectStop(stop.id));
    markers[stop.id]=m;
    m.addTo(map);
});

Object.keys(PATHS).forEach(rid=>{
    const coords=PATHS[rid].map(sid=>{const s=stopMap[sid];return s?[s.lat,s.lng]:null}).filter(Boolean);
    routeLayers[rid]=L.polyline(coords,{color:COLORS[rid],weight:4,opacity:.7,dashArray:rid==='LA'?'8,8':null});
});

// Legend
const leg=L.control({position:'bottomright'});
leg.onAdd=function(){
    const d=L.DomUtil.create('div','legend');
    d.innerHTML='<strong style="margin-bottom:4px;display:block">Routes</strong>'+
        Object.keys(NAMES).map(r=>`<div class="legend-item"><span class="legend-dot" style="background:${COLORS[r]}"></span>${NAMES[r]}</div>`).join('');
    return d;
};
leg.addTo(map);

// ═══════════════════════════════════════
//  ROUTE TOGGLE
// ═══════════════════════════════════════

function toggleRoute(rid){
    const btn=document.querySelector(`.route-btn[data-route="${rid}"]`);
    if(activeRoutes.has(rid)){
        activeRoutes.delete(rid);
        btn.classList.remove('active');
        if(routeLayers[rid])map.removeLayer(routeLayers[rid]);
        document.getElementById('tt-sec').classList.remove('visible');
    } else {
        activeRoutes.add(rid);
        btn.classList.add('active');
        if(routeLayers[rid])routeLayers[rid].addTo(map);
        showTimetable(rid);
    }
    updateVis();
}

function updateVis(){
    STOPS.forEach(s=>{
        const m=markers[s.id];
        if(!activeRoutes.size){m.addTo(map);m.setIcon(mkIcon(COLORS[s.routes[0]],22));return}
        const match=s.routes.filter(r=>activeRoutes.has(r));
        if(match.length){m.addTo(map);m.setIcon(mkIcon(COLORS[match[0]],26))}
        else{m.setIcon(mkIcon('#bbb',16))}
    });
}

// ═══════════════════════════════════════
//  STOP SELECTION
// ═══════════════════════════════════════

function selectStop(sid){
    selectedStop=sid;
    const s=stopMap[sid];if(!s)return;
    const p=document.getElementById('stop-info');
    p.classList.add('visible');
    document.getElementById('si-name').textContent=s.name;
    document.getElementById('si-routes').innerHTML=s.routes.map(r=>`<span class="rtag" style="background:${COLORS[r]}">${NAMES[r]}</span>`).join('');
    loadPhotos(sid);
    p.scrollIntoView({behavior:'smooth'});
    if(innerWidth<=768)document.getElementById('sidebar').classList.remove('open');
}

// ═══════════════════════════════════════
//  PHOTOS (localStorage)
// ═══════════════════════════════════════

function getP(sid){try{return JSON.parse(localStorage.getItem('bip_p_'+sid)||'[]')}catch{return[]}}
function setP(sid,arr){localStorage.setItem('bip_p_'+sid,JSON.stringify(arr))}

function loadPhotos(sid){
    const g=document.getElementById('si-photos');
    const photos=getP(sid);
    if(!photos.length){g.innerHTML='<span style="color:#aaa;font-size:.8rem">No photos yet</span>';return}
    g.innerHTML=photos.map((p,i)=>`<div style="position:relative;display:inline-block">
        <img src="${p}" onclick="openLB(this.src)" alt="Photo ${i+1}"/>
        <button class="dbtn" onclick="delPhoto('${sid}',${i})">&times;</button></div>`).join('');
}

function delPhoto(sid,i){const a=getP(sid);a.splice(i,1);setP(sid,a);loadPhotos(sid)}

document.getElementById('photo-input').addEventListener('change',function(e){
    if(!selectedStop)return;
    const files=[...e.target.files],photos=getP(selectedStop);
    let n=0;
    files.forEach(f=>{
        const r=new FileReader();
        r.onload=ev=>{
            const img=new Image();
            img.onload=()=>{
                const c=document.createElement('canvas');
                const M=800;let w=img.width,h=img.height;
                if(w>M||h>M){if(w>h){h=h*M/w;w=M}else{w=w*M/h;h=M}}
                c.width=w;c.height=h;c.getContext('2d').drawImage(img,0,0,w,h);
                photos.push(c.toDataURL('image/jpeg',.7));
                if(++n===files.length){setP(selectedStop,photos);loadPhotos(selectedStop)}
            };
            img.src=ev.target.result;
        };
        r.readAsDataURL(f);
    });
    e.target.value='';
});

function openLB(src){document.getElementById('lightbox-img').src=src;document.getElementById('lightbox').classList.add('visible')}
function closeLightbox(){document.getElementById('lightbox').classList.remove('visible')}
document.getElementById('lightbox').addEventListener('click',function(e){if(e.target===this)closeLightbox()});

// ═══════════════════════════════════════
//  TIMETABLE
// ═══════════════════════════════════════

function showTimetable(rid){
    curTTRoute=rid;
    document.getElementById('tt-sec').classList.add('visible');
    document.getElementById('tt-title').textContent='Timetable — '+NAMES[rid];
    renderTT(rid,curSched);
}

function showSchedule(type){
    curSched=type;
    document.querySelectorAll('.tt-tab').forEach(t=>t.classList.remove('active'));
    document.querySelector(`.tt-tab:${type==='weekday'?'first':'last'}-child`).classList.add('active');
    if(curTTRoute)renderTT(curTTRoute,type);
}

function renderTT(rid,sched){
    const d=TT[rid]?.[sched],el=document.getElementById('tt-content');
    if(!d||!d.stops.length){el.innerHTML=`<p class="tt-note">${d?.note||'No information available.'}</p>`;return}
    let h=`<p style="font-size:.82rem;color:#555;margin-bottom:8px">${d.dir}</p><div class="tt-wrap"><table class="tt-table"><thead><tr>`;
    d.stops.forEach(s=>h+=`<th>${s}</th>`);
    h+='</tr></thead><tbody>';
    d.trips.forEach(t=>{h+='<tr>';t.forEach(v=>h+=`<td>${v}</td>`);h+='</tr>'});
    h+='</tbody></table></div>';
    if(d.note)h+=`<p class="tt-note">${d.note}</p>`;
    h+=`<p class="tt-note" style="margin-top:10px">Valid from 5 January 2026.<br>SMAT Portalegre &mdash; Tel: 245 307 401</p>`;
    el.innerHTML=h;
}

// ═══════════════════════════════════════
//  KEYBOARD
// ═══════════════════════════════════════

document.addEventListener('keydown',e=>{
    if(e.key==='Escape'){closeLightbox();if(innerWidth<=768)document.getElementById('sidebar').classList.remove('open')}
});

// Fit map to all stops
map.fitBounds(L.latLngBounds(STOPS.map(s=>[s.lat,s.lng])).pad(0.1));
</script>
